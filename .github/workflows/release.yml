name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Diagnose macOS icon compile
        run: |
          xcodebuild -version
          xcrun actool --version --output-format=human-readable-text
          rm -rf "$RUNNER_TEMP/icon-diag"
          mkdir -p "$RUNNER_TEMP/icon-diag/out"
          xcrun actool src-tauri/icons/AppIcon.icon \
            --compile "$RUNNER_TEMP/icon-diag/out" \
            --output-format human-readable-text \
            --notices \
            --warnings \
            --output-partial-info-plist "$RUNNER_TEMP/icon-diag/out/assetcatalog_generated_info.plist" \
            --app-icon Icon \
            --include-all-app-icons \
            --accent-color AccentColor \
            --enable-on-demand-resources NO \
            --development-region en \
            --target-device mac \
            --minimum-deployment-target 26.0 \
            --platform macosx

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Import code-signing certificate
        env:
          APPLE_CODESIGN_P12_BASE64: ${{ secrets.APPLE_CODESIGN_P12_BASE64 }}
          APPLE_CODESIGN_P12_PASSWORD: ${{ secrets.APPLE_CODESIGN_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CODESIGN_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CODESIGN_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')

          rm "$RUNNER_TEMP/cert.p12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build sidecar
        run: bun run sidecar:build

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SGSql ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
