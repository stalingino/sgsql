name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Put actool on PATH
        # tauri-bundler shells out to a bare `actool` (not `xcrun actool`) to
        # compile icons/AppIcon.icon into Assets.car. `xcrun` normally
        # resolves the binary AND injects DEVELOPER_DIR, which actool needs
        # to find its own support resources for the newer Icon Composer
        # format; a bare spawn gets neither unless we set both explicitly.
        run: |
          dirname "$(xcrun -f actool)" >> "$GITHUB_PATH"
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"

      - name: Diagnose actool against a real mktemp -d (default TMPDIR)
        # tauri-bundler uses tempfile::tempdir(), which resolves to the OS
        # default TMPDIR (macOS: /var/folders/.../T/), not $RUNNER_TEMP.
        # That's the one variable my earlier diagnostics didn't control for.
        run: |
          echo "TMPDIR=$TMPDIR"
          WORK=$(mktemp -d)
          echo "WORK=$WORK"
          SRC="$PWD/src-tauri/icons/AppIcon.icon"
          DST="$WORK/Icon.icon"
          while IFS= read -r -d '' entry; do
            rel="${entry#"$SRC"/}"
            if [ -d "$entry" ]; then
              mkdir -p "$DST/$rel"
            else
              mkdir -p "$(dirname "$DST/$rel")"
              cp "$entry" "$DST/$rel"
            fi
          done < <(find "$SRC" -mindepth 1 -print0)
          mkdir -p "$WORK/out"
          actool "$DST" \
            --compile "$WORK/out" \
            --output-format human-readable-text \
            --notices \
            --warnings \
            --output-partial-info-plist "$WORK/out/assetcatalog_generated_info.plist" \
            --app-icon Icon \
            --include-all-app-icons \
            --accent-color AccentColor \
            --enable-on-demand-resources NO \
            --development-region en \
            --target-device mac \
            --minimum-deployment-target 26.0 \
            --platform macosx

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Import code-signing certificate
        env:
          APPLE_CODESIGN_P12_BASE64: ${{ secrets.APPLE_CODESIGN_P12_BASE64 }}
          APPLE_CODESIGN_P12_PASSWORD: ${{ secrets.APPLE_CODESIGN_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CODESIGN_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CODESIGN_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')

          rm "$RUNNER_TEMP/cert.p12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build sidecar
        run: bun run sidecar:build

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SGSql ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
